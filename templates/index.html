<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chats</title>
<style>
:root {
  --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460;
  --text: #e0e0e0; --text2: #fbfbfd; --accent: #e94560;
  --accent2: #533483; --green: #4ecca3; --border: #2a2a4a;
  --yellow: #f1c40f;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
a { color: var(--green); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Nav */
nav { display: flex; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 48px; flex-shrink: 0; }
nav .logo { font-weight: bold; font-size: 16px; color: var(--accent); margin-right: 24px; }
nav .tabs { display: flex; gap: 4px; }
nav .tab { padding: 8px 16px; cursor: pointer; border-radius: 6px 6px 0 0; color: var(--text2); font-size: 13px; }
nav .tab:hover { background: var(--surface2); color: var(--text); }
nav .tab.active { background: var(--surface2); color: var(--green); }
nav .right { margin-left: auto; }
nav .reindex-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
nav .reindex-btn:hover { color: var(--text); border-color: var(--green); }

/* Main */
.main { flex: 1; overflow: hidden; display: flex; }
.view { display: none; flex: 1; overflow: auto; padding: 20px; }
.view.active { display: flex; flex-direction: column; }

/* Search */
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-bar input, .search-bar select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 13px; }
.search-bar input[type="search"] { flex: 1; min-width: 200px; }
.search-bar input:focus, .search-bar select:focus { outline: none; border-color: var(--green); }
.results-info { color: var(--text2); font-size: 12px; margin-bottom: 12px; }

.filter-toggle { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; }
.filter-toggle:hover { border-color: var(--green); color: var(--text); }
.filter-toggle.active { border-color: var(--yellow); color: var(--yellow); }

.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
.result-card:hover { border-color: var(--accent2); }
.result-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text2); margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
.result-meta .project { color: var(--green); }
.result-meta .branch { color: var(--accent); }
.result-snippet { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.result-snippet mark { background: var(--accent); color: white; padding: 0 2px; border-radius: 2px; }
.result-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.btn-sm { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
.btn-sm:hover { color: var(--text); border-color: var(--green); }

.pagination { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
.pagination button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; }
.pagination button:hover { border-color: var(--green); }
.pagination button:disabled { opacity: 0.4; cursor: default; }

/* Star rating */
.star-rating { display: inline-flex; gap: 1px; align-items: center; }
.star-rating .star { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 1px; line-height: 1; color: var(--text2); opacity: 0.3; transition: opacity 0.1s; }
.star-rating .star.filled { color: var(--yellow); opacity: 1; }
.star-rating .star:hover { opacity: 0.8; }
.star-rating:hover .star { opacity: 0.5; }
.star-rating:hover .star.hovered { color: var(--yellow); opacity: 1; }

/* Tags */
.tag-chip { display: inline-block; background: var(--accent2); color: var(--text); padding: 1px 8px; border-radius: 10px; font-size: 10px; margin-right: 4px; cursor: pointer; }
.tag-chip:hover { opacity: 0.8; }
.tag-chip .remove-tag { margin-left: 4px; cursor: pointer; opacity: 0.6; }
.tag-chip .remove-tag:hover { opacity: 1; }
.tag-input-wrap { display: inline-flex; align-items: center; position: relative; }
.tag-input-wrap input { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 1px 6px; border-radius: 4px; font-size: 10px; font-family: inherit; width: 80px; }
.tag-input-wrap input:focus { outline: none; border-color: var(--green); }
.tag-autocomplete { position: absolute; top: 100%; left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; z-index: 50; max-height: 120px; overflow-y: auto; display: none; min-width: 120px; }
.tag-autocomplete .tag-option { padding: 4px 8px; cursor: pointer; font-size: 11px; }
.tag-autocomplete .tag-option:hover { background: var(--surface2); }

/* Browse */
.browse-layout { display: flex; gap: 16px; flex: 1; overflow: hidden; }
.browse-sidebar { width: 260px; flex-shrink: 0; overflow-y: auto; }
.browse-content { flex: 1; overflow-y: auto; }
.browse-filters { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.project-item { padding: 10px 12px; cursor: pointer; border-radius: 6px; margin-bottom: 4px; font-size: 13px; }
.project-item:hover { background: var(--surface2); }
.project-item.active { background: var(--surface2); border-left: 3px solid var(--green); }
.project-item .count { color: var(--text2); font-size: 11px; }
.session-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; position: relative; }
.session-item:hover { border-color: var(--accent2); }
.session-item .ts { color: var(--text2); font-size: 11px; }
.session-item .first-msg { color: #fbfbfd; font-size: 12px; margin-top: 6px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; max-height: 3.6em; overflow: hidden; opacity: 0.7; }
.session-item .session-actions { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
.session-item.file-missing { opacity: 0.65; border-style: dashed; }

/* Session detail */
.session-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.session-detail-header .back { cursor: pointer; color: var(--green); font-size: 13px; }
.message-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; position: relative; }
.message-card .ts { color: var(--text2); font-size: 11px; margin-bottom: 6px; }
.message-card .content { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.message-card .copy-btn { position: absolute; top: 8px; right: 8px; }
.message-card .assistant-response { margin-top: 10px; padding: 10px 12px; background: var(--surface2, #1a1a2e); border-radius: 6px; border-left: 3px solid var(--accent2, #4ecca3); }
.message-card .assistant-label { font-size: 10px; color: var(--accent2, #4ecca3); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
.message-card .assistant-label .caret { display: inline-block; transition: transform 0.15s; }
.message-card .assistant-response.collapsed .assistant-label { margin-bottom: 0; }
.message-card .assistant-response.collapsed .assistant-label .caret { transform: rotate(-90deg); }
.message-card .assistant-response.collapsed .assistant-text { display: none; }
.message-card .assistant-text { font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; opacity: 0.85; }

/* Timeline */
.timeline-controls { display: flex; gap: 8px; margin-bottom: 16px; }
.timeline-controls select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-family: inherit; }
.chart-container { overflow-x: auto; }
.chart { display: flex; align-items: flex-end; gap: 2px; min-height: 300px; padding: 20px 0; }
.chart-bar { display: flex; flex-direction: column; align-items: center; min-width: 18px; }
.chart-bar .bar { width: 14px; border-radius: 3px 3px 0 0; transition: height 0.3s; cursor: pointer; position: relative; }
.chart-bar .bar:hover { opacity: 0.8; }
.chart-bar .label { font-size: 9px; color: var(--text2); margin-top: 4px; writing-mode: vertical-rl; transform: rotate(180deg); max-height: 60px; overflow: hidden; }
.timeline-legend { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
.timeline-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.timeline-legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.tooltip { position: fixed; background: var(--surface); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; font-size: 11px; pointer-events: none; z-index: 100; display: none; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .num { font-size: 28px; font-weight: bold; color: var(--green); }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.stats-table { width: 100%; border-collapse: collapse; }
.stats-table th, .stats-table td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
.stats-table th { color: var(--text2); font-size: 11px; text-transform: uppercase; }

.empty { color: var(--text2); text-align: center; padding: 40px; font-size: 14px; }
.loading { color: var(--text2); text-align: center; padding: 20px; }

/* Dashboard */
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.dash-header h2 { margin: 0; font-size: 18px; }
.dash-updated { font-size: 11px; color: var(--text2); }
.dash-section { margin-bottom: 24px; }
.dash-section h3 { font-size: 13px; text-transform: uppercase; color: var(--text2); margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; }
.dash-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dash-dot.working { background: #4ade80; box-shadow: 0 0 8px #4ade80aa; animation: pulse 1.4s ease-in-out infinite; }
.dash-dot.waiting { background: #fbbf24; }
.dash-dot.closed { background: #6b7280; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.dash-grid { display: flex; flex-direction: column; gap: 12px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; transition: border-color 0.15s; position: relative; display: flex; flex-direction: column; gap: 8px; }
.dash-card:hover { border-color: var(--green); }
.dash-card .card-header { display: flex; align-items: center; gap: 8px; justify-content: space-between; padding-right: 4px; }
.dash-card .card-title { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
.dash-card .project { font-size: 13px; font-weight: 600; word-break: break-word; }
.dash-card .age { font-size: 11px; color: var(--text2); white-space: nowrap; }
.dash-card .card-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.dash-card .browse-link { font-size: 13px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-family: inherit; font-weight: 500; }
.dash-card .browse-link:hover { color: var(--green); border-color: var(--green); }
.dash-card .name { font-size: 12px; color: var(--green); font-weight: 500; word-break: break-word; }
.dash-card .divider { height: 1px; background: var(--border); margin: 0; }
.dash-card .exchange { font-size: 12px; line-height: 1.45; word-break: break-word; }
.dash-card .exchange .role { font-weight: 600; color: var(--text2); font-size: 11px; text-transform: uppercase; margin-right: 6px; }
.dash-card .exchange .first .role { color: #8b9bb4; }
.dash-card .exchange .you .role { color: #fbbf24; }
.dash-card .exchange .claude .role { color: #4ade80; }
.dash-card .exchange .text { color: var(--text); }
.dash-card .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text2); }
.dash-card .footer-actions { display: flex; gap: 8px; align-items: center; }
.dash-card .expand-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 13px; padding: 6px 14px; font-family: inherit; font-weight: 500; }
.dash-card .expand-btn:hover { color: var(--green); border-color: var(--green); }
.dash-card .transcript { max-height: 400px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; display: none; }
.dash-card.expanded .transcript { display: block; }
.dash-card .transcript .msg { font-size: 12px; margin-bottom: 8px; line-height: 1.45; word-break: break-word; }
.dash-card .transcript .msg .role { font-weight: 600; font-size: 10px; text-transform: uppercase; margin-right: 6px; }
.dash-card .transcript .msg.human .role { color: #fbbf24; }
.dash-card .transcript .msg.assistant .role { color: #4ade80; }
.dash-card.closed { opacity: 0.6; }
.dash-card .dismiss { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 6px; border-radius: 4px; opacity: 0.5; transition: opacity 0.15s, background 0.15s; }
.dash-card:hover .dismiss { opacity: 0.9; }
.dash-card .dismiss:hover { opacity: 1; background: var(--border); color: var(--accent); }
.dash-empty { color: var(--text2); font-size: 12px; padding: 8px 0; }
</style>
</head>
<body>

<nav>
  <span class="logo">Claude Chats</span>
  <div class="tabs">
    <div class="tab active" data-view="dashboard">Dashboard</div>
    <div class="tab" data-view="search">Search</div>
    <div class="tab" data-view="browse">Browse</div>
    <div class="tab" data-view="timeline">Timeline</div>
    <div class="tab" data-view="stats">Stats</div>
    <div class="tab" data-view="deleted">Deleted</div>
  </div>
  <div class="right">
    <button class="reindex-btn" onclick="doBackup()">Backup</button>
    <button class="reindex-btn" onclick="doReindex()">Reindex</button>
  </div>
</nav>

<div class="main">
  <!-- Dashboard View -->
  <div class="view active" id="view-dashboard">
    <div class="dash-header">
      <h2>Live Claude Code sessions</h2>
      <div>
        <span class="dash-updated" id="dash-updated"></span>
        <button class="reindex-btn" onclick="scanAndReload()" style="margin-left:8px;">Refresh</button>
      </div>
    </div>
    <div class="dash-section">
      <h3><span class="dash-dot working"></span> Working <span id="dash-count-working" style="color:var(--text2);font-weight:normal"></span></h3>
      <div class="dash-grid" id="dash-working"></div>
    </div>
    <div class="dash-section">
      <h3><span class="dash-dot waiting"></span> Waiting for you <span id="dash-count-waiting" style="color:var(--text2);font-weight:normal"></span></h3>
      <div class="dash-grid" id="dash-waiting"></div>
    </div>
    <div class="dash-section">
      <h3><span class="dash-dot closed"></span> Recently closed <span style="color:var(--text2);font-weight:normal;font-size:11px;">(last 10)</span></h3>
      <div class="dash-grid" id="dash-closed"></div>
    </div>
  </div>

  <!-- Search View -->
  <div class="view" id="view-search">
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="Search your messages... (press / to focus)" autocomplete="off">
      <select id="search-project"><option value="">All projects</option></select>
      <select id="search-tag"><option value="">All tags</option></select>
      <input type="date" id="search-from" title="From date">
      <input type="date" id="search-to" title="To date">
      <button class="filter-toggle" id="search-starred-btn" onclick="toggleSearchStarred()" title="Show only starred sessions">Starred</button>
      <select id="search-min-stars" title="Minimum star rating">
        <option value="">Min stars</option>
        <option value="1">1+ stars</option>
        <option value="2">2+ stars</option>
        <option value="3">3+ stars</option>
        <option value="4">4+ stars</option>
        <option value="5">5 stars</option>
      </select>
      <button class="filter-toggle" onclick="resetSearch()" title="Reset all search fields">Reset</button>
    </div>
    <div class="results-info" id="results-info"></div>
    <div id="search-results"></div>
    <div class="pagination" id="search-pagination"></div>
  </div>

  <!-- Browse View -->
  <div class="view" id="view-browse">
    <div class="browse-layout">
      <div class="browse-sidebar" id="browse-projects"></div>
      <div class="browse-content" id="browse-content">
        <div class="empty">Select a project to browse sessions</div>
      </div>
    </div>
  </div>

  <!-- Timeline View -->
  <div class="view" id="view-timeline">
    <div class="timeline-controls">
      <select id="timeline-granularity" onchange="loadTimeline()">
        <option value="day">Daily</option>
        <option value="week">Weekly</option>
      </select>
    </div>
    <div class="chart-container">
      <div class="chart" id="timeline-chart"></div>
    </div>
    <div class="timeline-legend" id="timeline-legend"></div>
  </div>

  <!-- Deleted View -->
  <div class="view" id="view-deleted">
    <div class="browse-layout">
      <div class="browse-sidebar" id="deleted-projects"></div>
      <div class="browse-content" id="deleted-content">
        <div class="empty">No deleted sessions</div>
      </div>
    </div>
  </div>

  <!-- Stats View -->
  <div class="view" id="view-stats">
    <div id="stats-content"><div class="loading">Loading stats...</div></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let allTags = []; // cached tag list

// --- Dashboard ---
let dashTimer = null;

function startDashboard() {
  loadDashboard();
  if (dashTimer) clearInterval(dashTimer);
  dashTimer = setInterval(loadDashboard, 5000);
}
function stopDashboard() {
  if (dashTimer) { clearInterval(dashTimer); dashTimer = null; }
}
function ago(iso) {
  if (!iso) return '';
  const s = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function fillDashCard(card, s, closed) {
  card.classList.toggle('closed', !!closed);
  const project = s.project || s.cwd || '(unknown)';
  card.querySelector('.project').textContent = project;
  card.querySelector('.age').textContent = ago(s.updated_at);

  const nameEl = card.querySelector('.name');
  if (s.name) { nameEl.textContent = s.name; nameEl.style.display = ''; }
  else { nameEl.textContent = ''; nameEl.style.display = 'none'; }

  const firstEl = card.querySelector('.exchange.first .text');
  const firstBlock = card.querySelector('.exchange.first');
  if (s.first_prompt) { firstEl.textContent = s.first_prompt; firstBlock.style.display = ''; }
  else { firstBlock.style.display = 'none'; }

  const youEl = card.querySelector('.exchange.you .text');
  const claudeEl = card.querySelector('.exchange.claude .text');
  const youBlock = card.querySelector('.exchange.you');
  const claudeBlock = card.querySelector('.exchange.claude');
  // Hide last-exchange block entirely if last_human matches first_prompt and there's no assistant reply yet.
  const duplicateFirst = s.last_human && s.last_human === s.first_prompt && !s.last_assistant;
  if (duplicateFirst || (!s.last_human && !s.last_assistant)) {
    youBlock.style.display = 'none';
    claudeBlock.style.display = 'none';
    card.querySelector('.divider.above-exchange').style.display = 'none';
  } else {
    card.querySelector('.divider.above-exchange').style.display = s.first_prompt ? '' : 'none';
    if (s.last_human) { youEl.textContent = s.last_human; youBlock.style.display = ''; }
    else { youBlock.style.display = 'none'; }
    if (s.last_assistant) { claudeEl.textContent = s.last_assistant; claudeBlock.style.display = ''; }
    else { claudeBlock.style.display = 'none'; }
  }

  const countEl = card.querySelector('.msg-count');
  countEl.textContent = s.message_count ? `${s.message_count} messages` : '';
}

function buildDashCard(s, closed) {
  const card = document.createElement('div');
  card.className = 'dash-card';
  card.dataset.sessionId = s.session_id || '';
  card.innerHTML = `
    <div class="card-header">
      <div class="card-title">
        <span class="project"></span>
        <span class="age"></span>
        <button class="browse-link" data-action="browse" title="Open in Browse view">Browse ↗</button>
        <button class="expand-btn" data-action="expand">▸ Expand transcript</button>
      </div>
      <div class="card-actions">
        <button class="dismiss" data-action="dismiss" title="Remove from dashboard">✕</button>
      </div>
    </div>
    <div class="name"></div>
    <div class="divider"></div>
    <div class="exchange first"><span class="text"></span></div>
    <div class="divider above-exchange"></div>
    <div class="exchange you"><span class="role">Last</span><span class="text"></span></div>
    <div class="exchange claude"><span class="role">Claude</span><span class="text"></span></div>
    <div class="card-footer">
      <span class="msg-count"></span>
    </div>
    <div class="transcript"></div>
  `;
  fillDashCard(card, s, closed);
  return card;
}

async function toggleTranscript(card) {
  const sid = card.dataset.sessionId;
  if (!sid) return;
  const transcriptEl = card.querySelector('.transcript');
  const btn = card.querySelector('.expand-btn');
  const isExpanded = card.classList.contains('expanded');
  if (isExpanded) {
    card.classList.remove('expanded');
    btn.textContent = '▸ Expand transcript';
    return;
  }
  if (!transcriptEl.dataset.loaded) {
    transcriptEl.innerHTML = '<div class="loading" style="padding:8px">Loading…</div>';
    try {
      const res = await fetch(`/api/dashboard/session/${encodeURIComponent(sid)}/transcript`);
      const data = await res.json();
      if (!data.messages || !data.messages.length) {
        transcriptEl.innerHTML = '<div class="dash-empty">No messages yet.</div>';
      } else {
        transcriptEl.innerHTML = data.messages.map(m => `
          <div class="msg ${m.role}">
            <span class="role">${m.role === 'assistant' ? 'Claude' : 'You'}</span>
            <span class="text"></span>
          </div>
        `).join('');
        const nodes = transcriptEl.querySelectorAll('.msg .text');
        data.messages.forEach((m, i) => { nodes[i].textContent = m.text; });
      }
      transcriptEl.dataset.loaded = '1';
      const countEl = card.querySelector('.msg-count');
      transcriptEl.dataset.cachedCount = countEl ? (countEl.textContent.match(/\d+/) || ['0'])[0] : '0';
    } catch (e) {
      transcriptEl.innerHTML = '<div class="dash-empty">Failed to load transcript.</div>';
    }
  }
  card.classList.add('expanded');
  btn.textContent = '▾ Collapse';
}

function reconcileSection(gridEl, sessions, closed, emptyMessage) {
  if (!gridEl) return;

  if (!sessions.length) {
    gridEl.innerHTML = `<div class="dash-empty">${esc(emptyMessage)}</div>`;
    return;
  }

  // Map existing card elements by session_id; remove the empty-state placeholder if present.
  const existing = new Map();
  for (const child of Array.from(gridEl.children)) {
    const sid = child.dataset && child.dataset.sessionId;
    if (sid) existing.set(sid, child);
    else child.remove();  // empty-state div
  }

  // Build the desired order, reusing existing elements in place.
  let prev = null;
  for (const s of sessions) {
    const sid = s.session_id || '';
    let card = existing.get(sid);
    if (card) {
      fillDashCard(card, s, closed);
      // Invalidate cached transcript if message count changed so next expand refetches.
      const tEl = card.querySelector('.transcript');
      if (tEl && tEl.dataset.cachedCount && tEl.dataset.cachedCount !== String(s.message_count || 0)) {
        delete tEl.dataset.loaded;
      }
      existing.delete(sid);
    } else {
      card = buildDashCard(s, closed);
    }
    // Insert in correct position without disrupting elements already in the right slot.
    const target = prev ? prev.nextSibling : gridEl.firstChild;
    if (card !== target) gridEl.insertBefore(card, target);
    prev = card;
  }

  // Remove any leftover cards that weren't in the new list.
  for (const stale of existing.values()) stale.remove();
}

async function scanAndReload() {
  const el = $('#dash-updated');
  const prev = el.textContent;
  el.textContent = 'Scanning...';
  try {
    await fetch('/api/dashboard/scan', { method: 'POST' });
  } catch (e) {
    el.textContent = prev;
  }
  loadDashboard();
}

async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard');
    const data = await res.json();
    const working = data.active.filter(s => s.state === 'working');
    const waiting = data.active.filter(s => s.state === 'waiting');
    const closed = data.recently_closed || [];
    reconcileSection($('#dash-working'), working, false, 'Nothing actively working.');
    reconcileSection($('#dash-waiting'), waiting, false,
      'No sessions waiting. If you expected some here, make sure hooks are installed (see SHARING.md).');
    reconcileSection($('#dash-closed'), closed, true, 'No sessions have ended recently.');
    $('#dash-count-working').textContent = working.length ? `(${working.length})` : '';
    $('#dash-count-waiting').textContent = waiting.length ? `(${waiting.length})` : '';
    $('#dash-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    $('#dash-updated').textContent = 'Failed to load';
  }
}

async function dismissDashSession(sessionId) {
  try {
    await fetch(`/api/dashboard/session/${encodeURIComponent(sessionId)}`, { method: 'DELETE' });
  } catch (e) { /* ignore; refresh will reflect server truth */ }
  loadDashboard();
}

// Event delegation: one listener per grid handles dismiss, browse, and expand clicks.
document.addEventListener('DOMContentLoaded', () => {
  for (const gridId of ['dash-working', 'dash-waiting', 'dash-closed']) {
    const grid = document.getElementById(gridId);
    if (!grid) continue;
    grid.addEventListener('click', (e) => {
      const actionBtn = e.target.closest('[data-action]');
      if (!actionBtn) return;
      const card = actionBtn.closest('.dash-card');
      if (!card) return;
      const sid = card.dataset.sessionId;
      const action = actionBtn.dataset.action;
      if (action === 'dismiss' && sid) { dismissDashSession(sid); }
      else if (action === 'browse' && sid) { showSession(sid); }
      else if (action === 'expand') { toggleTranscript(card); }
    });
  }
  startDashboard();
});

async function refreshTags() {

// --- Star/Archive/Tag helpers ---
function renderStars(sessionId, rating, containerId) {
  let html = `<span class="star-rating" id="${containerId}"
    onmouseleave="starHoverClear(this)">`;
  for (let i = 1; i <= 5; i++) {
    html += `<button class="star ${i <= rating ? 'filled' : ''}" data-val="${i}"
      onclick="event.stopPropagation();setStarRating('${sessionId}','${containerId}',${i})"
      onmouseenter="starHover(this,${i})">\u2605</button>`;
  }
  html += '</span>';
  return html;
}

function starHover(el, val) {
  const wrap = el.closest('.star-rating');
  wrap.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('hovered', parseInt(s.dataset.val) <= val);
  });
}

function starHoverClear(wrap) {
  wrap.querySelectorAll('.star').forEach(s => s.classList.remove('hovered'));
}

async function setStarRating(sessionId, containerId, rating) {
  const res = await fetch(`/api/session/${sessionId}/star`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ rating })
  });
  const data = await res.json();
  const container = document.getElementById(containerId);
  if (container) {
    container.querySelectorAll('.star').forEach(s => {
      s.classList.toggle('filled', parseInt(s.dataset.val) <= data.starred);
    });
  }
}

async function toggleArchive(sessionId) {
  await fetch(`/api/session/${sessionId}/archive`, { method: 'PUT' });
  // Refresh current browse view
  if (browseSelectedProjects.size > 0) loadBrowseSessions();
}

async function hideSession(sessionId) {
  if (!confirm('Remove this session from the app? It will no longer appear anywhere.')) return;
  await fetch(`/api/session/${sessionId}/hide`, { method: 'PUT' });
  if (browseSelectedProjects.size > 0) loadBrowseSessions();
  else loadProjects();
}

async function setSessionTags(sessionId, tags) {
  const res = await fetch(`/api/session/${sessionId}/tags`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tags }) });
  const data = await res.json();
  refreshTags();
  return data.tags;
}

function renderTagChips(tags, sessionId, editable = true) {
  let html = tags.map(t =>
    `<span class="tag-chip" onclick="event.stopPropagation(); filterByTag('${esc(t)}')">${esc(t)}${editable ? `<span class="remove-tag" onclick="event.stopPropagation(); removeTag('${sessionId}', '${esc(t)}', this)">x</span>` : ''}</span>`
  ).join('');
  if (editable) {
    html += `<span class="tag-input-wrap">
      <input type="text" placeholder="+tag" onclick="event.stopPropagation()" onkeydown="handleTagKey(event, '${sessionId}')" onfocus="showTagAutocomplete(this)" oninput="showTagAutocomplete(this)" onblur="setTimeout(()=>hideTagAutocomplete(this),200)">
      <div class="tag-autocomplete"></div>
    </span>`;
  }
  return html;
}

function handleTagKey(e, sessionId) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const input = e.target;
    const tag = input.value.trim();
    if (!tag) return;
    // Get current tags from sibling chips
    const wrap = input.closest('.session-actions, .result-actions, .session-detail-header');
    const currentTags = Array.from(wrap.querySelectorAll('.tag-chip')).map(c => c.textContent.replace(/x$/, '').trim());
    if (!currentTags.includes(tag)) {
      currentTags.push(tag);
      setSessionTags(sessionId, currentTags).then(() => {
        // Refresh the relevant view
        if (browseSelectedProjects.size > 0 && $('#view-browse').classList.contains('active')) {
          loadBrowseSessions();
        } else {
          doSearch(searchPage);
        }
      });
    }
    input.value = '';
  } else if (e.key === 'Escape') {
    e.target.value = '';
    e.target.blur();
  }
}

async function removeTag(sessionId, tag, el) {
  const wrap = el.closest('.session-actions, .result-actions, .session-detail-header');
  const currentTags = Array.from(wrap.querySelectorAll('.tag-chip')).map(c => c.textContent.replace(/x$/, '').trim()).filter(t => t !== tag);
  await setSessionTags(sessionId, currentTags);
  if (browseSelectedProjects.size > 0 && $('#view-browse').classList.contains('active')) {
    loadBrowseSessions();
  } else {
    doSearch(searchPage);
  }
}

function showTagAutocomplete(input) {
  const dropdown = input.nextElementSibling;
  const val = input.value.toLowerCase();
  const matches = allTags.filter(t => !val || t.tag.toLowerCase().includes(val)).slice(0, 8);
  if (!matches.length) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map(t =>
    `<div class="tag-option" onmousedown="event.preventDefault(); pickTag(this, '${esc(t.tag)}')">${esc(t.tag)} (${t.count})</div>`
  ).join('');
  dropdown.style.display = 'block';
}

function hideTagAutocomplete(input) {
  input.nextElementSibling.style.display = 'none';
}

function pickTag(el, tag) {
  const input = el.closest('.tag-input-wrap').querySelector('input');
  input.value = tag;
  input.nextElementSibling.style.display = 'none';
  // Simulate Enter
  input.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter' }));
}

function filterByTag(tag) {
  // Switch to search, set tag filter
  $('nav .tab[data-view="search"]').click();
  $('#search-tag').value = tag;
  doSearch(1);
}

// --- Search ---
let searchPage = 1;
let searchStarred = false;

function toggleSearchStarred() {
  searchStarred = !searchStarred;
  $('#search-starred-btn').classList.toggle('active', searchStarred);
  doSearch(1);
}

function resetSearch() {
  $('#search-input').value = '';
  $('#search-project').value = '';
  $('#search-tag').value = '';
  $('#search-from').value = '';
  $('#search-to').value = '';
  $('#search-min-stars').value = '';
  searchStarred = false;
  $('#search-starred-btn').classList.remove('active');
  $('#search-results').innerHTML = '';
  $('#results-info').textContent = '';
  $('#search-pagination').innerHTML = '';
}

async function doSearch(page = 1) {
  const q = $('#search-input').value.trim();
  const hasFilters = $('#search-project').value || $('#search-tag').value || $('#search-from').value || $('#search-to').value || $('#search-min-stars').value || searchStarred;
  if (!q && !hasFilters) { $('#search-results').innerHTML = ''; $('#results-info').textContent = ''; $('#search-pagination').innerHTML = ''; return; }
  searchPage = page;
  const params = new URLSearchParams({ q, page, project: $('#search-project').value, from: $('#search-from').value, to: $('#search-to').value });
  if (searchStarred) params.set('starred', '1');
  const minStars = $('#search-min-stars').value;
  if (minStars) params.set('min_stars', minStars);
  const tagVal = $('#search-tag').value;
  if (tagVal) params.set('tag', tagVal);
  const res = await fetch(`/api/search?${params}`);
  const data = await res.json();
  $('#results-info').textContent = `${data.total} result${data.total !== 1 ? 's' : ''} found`;
  let srIdx = 0;
  $('#search-results').innerHTML = data.results.map(r => {
    const starId = `sr-star-${srIdx++}`;
    return `
    <div class="result-card">
      <div class="result-meta">
        ${renderStars(r.session_id, r.starred, starId)}
        <span class="project">${esc(r.project)}</span>
        ${r.git_branch ? `<span class="branch">${esc(r.git_branch)}</span>` : ''}
        <span>${formatTs(r.timestamp)}</span>
      </div>
      <div class="result-snippet">${r.snippet}</div>
      ${r.assistant_snippet && r.assistant_snippet.includes('<mark>') ? `<div class="result-snippet" style="margin-top:4px;opacity:0.75;border-left:2px solid var(--accent2,#4ecca3);padding-left:8px"><span style="font-size:10px;color:var(--accent2,#4ecca3);font-weight:bold">CLAUDE</span> ${r.assistant_snippet}</div>` : ''}
      <div class="result-actions">
        <button class="btn-sm" data-copy="${esc(r.content).replace(/"/g,'&quot;')}" onclick="copyText(this)">Copy</button>
        <button class="btn-sm" onclick="showSession('${r.session_id}')">View session</button>
        ${renderTagChips(r.tags || [], r.session_id)}
      </div>
    </div>
  `;}).join('');
  const totalPages = Math.ceil(data.total / (data.per_page || 20));
  let pg = '';
  if (totalPages > 1) {
    pg += `<button ${page <= 1 ? 'disabled' : ''} onclick="doSearch(${page-1})">Prev</button>`;
    pg += `<span style="color:var(--text2);font-size:12px;align-self:center">Page ${page} of ${totalPages}</span>`;
    pg += `<button ${page >= totalPages ? 'disabled' : ''} onclick="doSearch(${page+1})">Next</button>`;
  }
  $('#search-pagination').innerHTML = pg;
}

let searchTimeout;
$('#search-input').addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => doSearch(1), 300); });
$('#search-project').addEventListener('change', () => doSearch(1));
$('#search-from').addEventListener('change', () => doSearch(1));
$('#search-to').addEventListener('change', () => doSearch(1));
$('#search-tag').addEventListener('change', () => doSearch(1));
$('#search-min-stars').addEventListener('change', () => doSearch(1));

// Populate project filter
fetch('/api/projects').then(r => r.json()).then(projects => {
  const sel = $('#search-project');
  projects.forEach(p => { const o = document.createElement('option'); o.value = p.project; o.textContent = `${p.project} (${p.message_count})`; sel.appendChild(o); });
});

// Default to Browse view with all projects selected
loadProjects();

// --- Browse ---
let browseSelectedProjects = new Set();
let browseShowArchived = false;
let browseStarredOnly = false;
let browseTagFilter = '';
let browseMinStars = '';
let browseSort = 'date_desc';
let browseSortProjects = 'chrono'; // 'chrono' or 'alpha'
let browseAllProjects = []; // cached project list from API
let browseLastViewedSession = null; // session ID to scroll to after going back

async function loadProjects() {
  const res = await fetch('/api/projects');
  browseAllProjects = await res.json();
  if (browseSelectedProjects.size === 0 && browseAllProjects.length > 0) {
    browseAllProjects.forEach(p => browseSelectedProjects.add(p.project));
  }
  renderProjectSidebar();
  if (browseSelectedProjects.size > 0) loadBrowseSessions();
}

function renderProjectSidebar() {
  let projects = [...browseAllProjects];
  if (browseSortProjects === 'alpha') {
    projects.sort((a, b) => a.project.localeCompare(b.project));
  }
  // browseSortProjects === 'chrono' keeps API order (last_ts DESC)

  const toolbar = `<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
    <button class="btn-sm" onclick="selectAllProjects()">Select All</button>
    <button class="btn-sm" onclick="clearProjectSelection()">Clear</button>
    <select class="btn-sm" onchange="browseSortProjects=this.value;renderProjectSidebar()" style="font-family:inherit;font-size:11px;cursor:pointer">
      <option value="chrono" ${browseSortProjects==='chrono'?'selected':''}>Recent first</option>
      <option value="alpha" ${browseSortProjects==='alpha'?'selected':''}>A \u2192 Z</option>
    </select>
  </div>`;

  $('#browse-projects').innerHTML = toolbar + projects.map(p => `
    <div class="project-item ${browseSelectedProjects.has(p.project) ? 'active' : ''}" data-project="${esc(p.project)}">
      ${esc(p.project)}
      <div class="count">${p.session_count} sessions \u00b7 ${p.message_count} messages</div>
    </div>
  `).join('');

  $('#browse-projects').querySelectorAll('.project-item').forEach(el => {
    if (!el.dataset.project) return;
    el.addEventListener('click', function(e) {
      toggleProject(this.dataset.project, e);
    });
  });
}

function toggleProject(project, event) {
  if (event && (event.metaKey || event.ctrlKey)) {
    if (browseSelectedProjects.has(project)) {
      browseSelectedProjects.delete(project);
    } else {
      browseSelectedProjects.add(project);
    }
  } else {
    if (browseSelectedProjects.size === 1 && browseSelectedProjects.has(project)) {
      browseSelectedProjects.clear();
    } else {
      browseSelectedProjects.clear();
      browseSelectedProjects.add(project);
    }
  }
  renderProjectSidebar();
  loadBrowseSessions();
}

function selectAllProjects() {
  browseAllProjects.forEach(p => browseSelectedProjects.add(p.project));
  renderProjectSidebar();
  loadBrowseSessions();
}

function clearProjectSelection() {
  browseSelectedProjects.clear();
  renderProjectSidebar();
  loadBrowseSessions();
}

async function loadBrowseSessions() {
  if (browseSelectedProjects.size === 0) {
    $('#browse-content').innerHTML = '<div class="empty">Select a project to browse sessions</div>';
    return;
  }

  const projectParam = Array.from(browseSelectedProjects).join(',');
  const params = new URLSearchParams({ project: projectParam });
  if (browseShowArchived) params.set('archived', '1');
  if (browseStarredOnly) params.set('starred', '1');
  if (browseMinStars) params.set('min_stars', browseMinStars);
  if (browseTagFilter) params.set('tag', browseTagFilter);
  if (browseSort) params.set('sort', browseSort);
  const res = await fetch(`/api/sessions?${params}`);
  const sessions = await res.json();

  let filtersHtml = `<div class="browse-filters">
    <button class="filter-toggle ${browseStarredOnly ? 'active' : ''}" onclick="browseStarredOnly=!browseStarredOnly;loadBrowseSessions()">Starred</button>
    <select class="filter-toggle" onchange="browseMinStars=this.value;if(this.value)browseStarredOnly=false;loadBrowseSessions()" style="font-family:inherit;font-size:12px">
      <option value="">Min stars</option>
      ${[1,2,3,4,5].map(n => `<option value="${n}" ${browseMinStars==n ? 'selected' : ''}>${n}+ stars</option>`).join('')}
    </select>
    <select class="filter-toggle" onchange="browseSort=this.value;loadBrowseSessions()" style="font-family:inherit;font-size:12px">
      <option value="date_desc" ${browseSort==='date_desc'?'selected':''}>Newest first</option>
      <option value="date_asc" ${browseSort==='date_asc'?'selected':''}>Oldest first</option>
      <option value="stars_desc" ${browseSort==='stars_desc'?'selected':''}>Most stars</option>
      <option value="stars_asc" ${browseSort==='stars_asc'?'selected':''}>Fewest stars</option>
    </select>
    <button class="filter-toggle ${browseShowArchived ? 'active' : ''}" onclick="browseShowArchived=!browseShowArchived;loadBrowseSessions()">Show archived</button>
    <select class="filter-toggle" onchange="browseTagFilter=this.value;loadBrowseSessions()" style="font-family:inherit;font-size:12px">
      <option value="">All tags</option>
      ${allTags.map(t => `<option value="${esc(t.tag)}" ${t.tag === browseTagFilter ? 'selected' : ''}>${esc(t.tag)} (${t.count})</option>`).join('')}
    </select>
  </div>`;

  if (!sessions.length) {
    $('#browse-content').innerHTML = filtersHtml + '<div class="empty">No sessions found</div>';
    return;
  }
  let bsIdx = 0;
  $('#browse-content').innerHTML = filtersHtml + sessions.map(s => {
    const starId = `bs-star-${bsIdx++}`;
    return `
    <div class="session-item${s.file_missing ? ' file-missing' : ''}" data-session="${s.session_id}" onclick="showSession('${s.session_id}')">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${renderStars(s.session_id, s.starred, starId)}
        ${s.name || s.slug ? `<span style="color:var(--green);font-size:13px;font-weight:bold">${esc(s.name || s.slug)}</span>` : ''}
        <strong>${s.message_count} messages</strong>
        ${s.file_missing ? '<span style="color:var(--text2);font-size:11px;opacity:0.7" title="Source transcript file deleted from disk">&#x1f6ab; deleted</span>' : ''}
        ${browseSelectedProjects.size > 1 ? `<span style="color:var(--text2);font-size:11px">${esc(s.project)}</span>` : ''}
      </div>
      <div class="ts">${formatTs(s.first_ts)} \u2192 ${formatTs(s.last_ts)}</div>
      ${s.first_message ? `<div class="first-msg">${esc(s.first_message)}</div>` : ''}
      <div class="session-actions">
        ${renderTagChips(s.tags || [], s.session_id)}
        <button class="btn-sm" onclick="event.stopPropagation();toggleArchive('${s.session_id}')">Archive</button>
        <button class="btn-sm" onclick="event.stopPropagation();hideSession('${s.session_id}')" title="Remove from app (keeps data in DB)">Delete</button>
      </div>
    </div>
  `;}).join('');

  if (browseLastViewedSession) {
    const el = $('#browse-content').querySelector(`[data-session="${browseLastViewedSession}"]`);
    if (el) el.scrollIntoView({ block: 'center' });
    browseLastViewedSession = null;
  }
}

async function showSession(sessionId) {
  browseLastViewedSession = sessionId;
  $$('nav .tab').forEach(t => t.classList.remove('active'));
  $$('.view').forEach(v => v.classList.remove('active'));
  $('nav .tab[data-view="browse"]').classList.add('active');
  $('#view-browse').classList.add('active');
  stopDashboard();

  const [msgRes, metaRes] = await Promise.all([
    fetch(`/api/session/${sessionId}`),
    fetch(`/api/session/${sessionId}/meta`),
  ]);
  const data = await msgRes.json();
  const messages = data.messages;
  const session = data.session || {};
  const meta = await metaRes.json();
  const starred = meta.starred;
  const tags = meta.tags;
  const displayName = session.name || session.slug || '';

  $('#browse-content').innerHTML = `
    <div class="session-detail-header">
      <span class="back" onclick="browseSelectedProjects.size ? loadBrowseSessions() : loadProjects()">\u2190 Back</span>
      ${renderStars(sessionId, starred, 'detail-stars')}
      ${displayName ? `<strong style="font-size:14px">${esc(displayName)}</strong>` : ''}
      <span style="color:var(--text2);font-size:12px">${messages.length} messages \u00b7 ${messages[0]?.project || ''}</span>
      <button class="btn-sm" onclick="toggleArchive('${sessionId}')">Archive</button>
      <button class="btn-sm" onclick="hideSession('${sessionId}')" title="Remove from app (keeps data in DB)">Delete</button>
      ${renderTagChips(tags, sessionId)}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px">
      <code style="color:var(--green)">/resume ${sessionId}</code>
      <button class="btn-sm copy-btn" onclick="navigator.clipboard.writeText('/resume ${sessionId}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)">Copy</button>
    </div>
    ${messages.map(m => `
      <div class="message-card">
        <div class="ts">${formatTs(m.timestamp)}${m.git_branch ? ` \u00b7 ${esc(m.git_branch)}` : ''}</div>
        <div class="content">${esc(m.content)}</div>
        ${m.assistant_response ? `<div class="assistant-response"><div class="assistant-label" onclick="this.parentElement.classList.toggle('collapsed')"><span class="caret">▼</span>Claude</div><div class="assistant-text">${esc(m.assistant_response)}</div></div>` : ''}
        <button class="btn-sm copy-btn" data-copy="${esc(m.content).replace(/"/g,'&quot;')}" onclick="copyText(this)">Copy</button>
      </div>
    `).join('')}
  `;
}

// --- Timeline ---
const projectColors = {};
const palette = ['#e94560','#4ecca3','#533483','#f39c12','#3498db','#e74c3c','#2ecc71','#9b59b6','#1abc9c','#e67e22'];
let colorIdx = 0;
function getColor(project) {
  if (!projectColors[project]) projectColors[project] = palette[colorIdx++ % palette.length];
  return projectColors[project];
}

async function loadTimeline() {
  const g = $('#timeline-granularity').value;
  const res = await fetch(`/api/timeline?granularity=${g}`);
  const data = await res.json();
  if (!data.length) { $('#timeline-chart').innerHTML = '<div class="empty">No data</div>'; return; }

  const periods = {};
  let maxCount = 0;
  data.forEach(d => {
    if (!periods[d.period]) periods[d.period] = {};
    periods[d.period][d.project] = (periods[d.period][d.project] || 0) + d.count;
  });
  Object.values(periods).forEach(p => { const t = Object.values(p).reduce((a,b)=>a+b,0); if(t>maxCount) maxCount=t; });

  const maxH = 280;
  $('#timeline-chart').innerHTML = Object.entries(periods).map(([period, projects]) => {
    const total = Object.values(projects).reduce((a,b)=>a+b,0);
    const h = Math.max(4, (total / maxCount) * maxH);
    const segments = Object.entries(projects).map(([proj, cnt]) => {
      const sh = (cnt / total) * h;
      return `<div class="bar" style="height:${sh}px;background:${getColor(proj)}" data-tip="${period}: ${proj} (${cnt})" data-project="${proj}"></div>`;
    }).join('');
    const label = period.length > 10 ? period.slice(5) : period;
    return `<div class="chart-bar"><div style="display:flex;flex-direction:column">${segments}</div><div class="label">${label}</div></div>`;
  }).join('');

  const projectCounts = {};
  data.forEach(d => { projectCounts[d.project] = (projectCounts[d.project] || 0) + d.count; });
  const sortedProjects = Object.entries(projectCounts).sort((a, b) => b[1] - a[1]);
  $('#timeline-legend').innerHTML = sortedProjects.map(([p, cnt]) =>
    `<div class="timeline-legend-item" data-project="${p}"><div class="timeline-legend-swatch" style="background:${getColor(p)}"></div>${p} (${cnt})</div>`
  ).join('');

  $$('.chart-bar .bar').forEach(bar => {
    bar.addEventListener('mouseenter', e => {
      const tip = $('#tooltip');
      tip.textContent = bar.dataset.tip;
      tip.style.display = 'block';
      tip.style.left = e.clientX + 10 + 'px';
      tip.style.top = e.clientY - 30 + 'px';
      const proj = bar.dataset.project;
      $$('.timeline-legend-item').forEach(el => {
        el.style.opacity = el.dataset.project === proj ? '1' : '0.3';
        el.style.fontWeight = el.dataset.project === proj ? 'bold' : '';
      });
    });
    bar.addEventListener('mouseleave', () => {
      $('#tooltip').style.display = 'none';
      $$('.timeline-legend-item').forEach(el => { el.style.opacity = '1'; el.style.fontWeight = ''; });
    });
  });

  $$('.timeline-legend-item').forEach(item => {
    item.style.cursor = 'pointer';
    item.addEventListener('mouseenter', () => {
      const proj = item.dataset.project;
      $$('.chart-bar .bar').forEach(bar => { bar.style.opacity = bar.dataset.project === proj ? '1' : '0.15'; });
      $$('.timeline-legend-item').forEach(el => {
        el.style.opacity = el.dataset.project === proj ? '1' : '0.3';
        el.style.fontWeight = el.dataset.project === proj ? 'bold' : '';
      });
    });
    item.addEventListener('mouseleave', () => {
      $$('.chart-bar .bar').forEach(bar => { bar.style.opacity = '1'; });
      $$('.timeline-legend-item').forEach(el => { el.style.opacity = '1'; el.style.fontWeight = ''; });
    });
  });
}

// --- Stats ---

  const data = await res.json();

    <div class="stats-grid">
      <div class="stat-card"><div class="num">${data.total_messages}</div><div class="label">Messages</div></div>
      <div class="stat-card"><div class="num">${data.total_sessions}</div><div class="label">Sessions</div></div>
      <div class="stat-card"><div class="num">${data.total_projects}</div><div class="label">Projects</div></div>
    </div>
    <h3 style="color:var(--text2);margin-bottom:12px;font-size:13px">PER PROJECT</h3>
    <table class="stats-table">
      <tr><th>Project</th><th>Messages</th><th>Sessions</th><th>First</th><th>Last</th></tr>
      ${data.per_project.map(p => `
        <tr><td style="color:var(--green)">${esc(p.project)}</td><td>${p.messages}</td><td>${p.sessions}</td>
        <td style="color:var(--text2)">${formatTs(p.first_ts)}</td><td style="color:var(--text2)">${formatTs(p.last_ts)}</td></tr>

// --- Deleted ---
let deletedSelectedProjects = new Set();
let deletedAllProjects = [];
let deletedSortProjects = 'chrono';
let deletedStarredOnly = false;
let deletedMinStars = '';
let deletedTagFilter = '';
let deletedSort = 'date_desc';

async function loadDeletedProjects() {
  const res = await fetch('/api/deleted/projects');
  deletedAllProjects = await res.json();
  if (deletedSelectedProjects.size === 0 && deletedAllProjects.length > 0) {
    deletedAllProjects.forEach(p => deletedSelectedProjects.add(p.project));
  }
  // Remove stale selections
  const valid = new Set(deletedAllProjects.map(p => p.project));
  for (const p of deletedSelectedProjects) { if (!valid.has(p)) deletedSelectedProjects.delete(p); }
  renderDeletedSidebar();
  loadDeletedSessions();
}

function renderDeletedSidebar() {
  let projects = [...deletedAllProjects];
  if (deletedSortProjects === 'alpha') projects.sort((a, b) => a.project.localeCompare(b.project));

  const toolbar = `<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
    <button class="btn-sm" onclick="deletedAllProjects.forEach(p=>deletedSelectedProjects.add(p.project));renderDeletedSidebar();loadDeletedSessions()">Select All</button>
    <button class="btn-sm" onclick="deletedSelectedProjects.clear();renderDeletedSidebar();loadDeletedSessions()">Clear</button>
    <select class="btn-sm" onchange="deletedSortProjects=this.value;renderDeletedSidebar()" style="font-family:inherit;font-size:11px;cursor:pointer">
      <option value="chrono" ${deletedSortProjects==='chrono'?'selected':''}>Recent first</option>
      <option value="alpha" ${deletedSortProjects==='alpha'?'selected':''}>A \u2192 Z</option>
    </select>
  </div>`;

  $('#deleted-projects').innerHTML = toolbar + projects.map(p => `
    <div class="project-item ${deletedSelectedProjects.has(p.project) ? 'active' : ''}" data-project="${esc(p.project)}">
      ${esc(p.project)}
      <div class="count">${p.session_count} sessions</div>
    </div>
  `).join('');

  $('#deleted-projects').querySelectorAll('.project-item').forEach(el => {
    if (!el.dataset.project) return;
    el.addEventListener('click', function(e) {
      toggleDeletedProject(this.dataset.project, e);
    });
  });
}

function toggleDeletedProject(project, event) {
  if (event && (event.metaKey || event.ctrlKey)) {
    if (deletedSelectedProjects.has(project)) deletedSelectedProjects.delete(project);
    else deletedSelectedProjects.add(project);
  } else {
    if (deletedSelectedProjects.size === 1 && deletedSelectedProjects.has(project)) {
      deletedSelectedProjects.clear();
    } else {
      deletedSelectedProjects.clear();
      deletedSelectedProjects.add(project);
    }
  }
  renderDeletedSidebar();
  loadDeletedSessions();
}

async function loadDeletedSessions() {
  if (deletedSelectedProjects.size === 0 && deletedAllProjects.length > 0) {
    $('#deleted-content').innerHTML = '<div class="empty">Select a project to browse deleted sessions</div>';
    return;
  }
  if (deletedAllProjects.length === 0) {
    $('#deleted-content').innerHTML = '<div class="empty">No deleted sessions</div>';
    return;
  }

  const projectParam = Array.from(deletedSelectedProjects).join(',');
  const params = new URLSearchParams({ project: projectParam });
  if (deletedStarredOnly) params.set('starred', '1');
  if (deletedMinStars) params.set('min_stars', deletedMinStars);
  if (deletedTagFilter) params.set('tag', deletedTagFilter);
  if (deletedSort) params.set('sort', deletedSort);
  const res = await fetch(`/api/deleted?${params}`);
  const sessions = await res.json();

  let filtersHtml = `<div class="browse-filters">
    <button class="filter-toggle ${deletedStarredOnly ? 'active' : ''}" onclick="deletedStarredOnly=!deletedStarredOnly;loadDeletedSessions()">Starred</button>
    <select class="filter-toggle" onchange="deletedMinStars=this.value;if(this.value)deletedStarredOnly=false;loadDeletedSessions()" style="font-family:inherit;font-size:12px">
      <option value="">Min stars</option>
      ${[1,2,3,4,5].map(n => `<option value="${n}" ${deletedMinStars==n ? 'selected' : ''}>${n}+ stars</option>`).join('')}
    </select>
    <select class="filter-toggle" onchange="deletedSort=this.value;loadDeletedSessions()" style="font-family:inherit;font-size:12px">
      <option value="date_desc" ${deletedSort==='date_desc'?'selected':''}>Newest first</option>
      <option value="date_asc" ${deletedSort==='date_asc'?'selected':''}>Oldest first</option>
      <option value="stars_desc" ${deletedSort==='stars_desc'?'selected':''}>Most stars</option>
      <option value="stars_asc" ${deletedSort==='stars_asc'?'selected':''}>Fewest stars</option>
    </select>
    <select class="filter-toggle" onchange="deletedTagFilter=this.value;loadDeletedSessions()" style="font-family:inherit;font-size:12px">
      <option value="">All tags</option>
      ${allTags.map(t => `<option value="${esc(t.tag)}" ${t.tag === deletedTagFilter ? 'selected' : ''}>${esc(t.tag)} (${t.count})</option>`).join('')}
    </select>
  </div>`;

  if (!sessions.length) {
    $('#deleted-content').innerHTML = filtersHtml + '<div class="empty">No deleted sessions match filters</div>';
    return;
  }

  let dsIdx = 0;
  $('#deleted-content').innerHTML = filtersHtml + sessions.map(s => {
    const starId = `ds-star-${dsIdx++}`;
    return `
    <div class="session-item" data-session="${s.session_id}" onclick="showDeletedSession('${s.session_id}')">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${renderStars(s.session_id, s.starred, starId)}
        ${s.name || s.slug ? `<span style="color:var(--green);font-size:13px;font-weight:bold">${esc(s.name || s.slug)}</span>` : ''}
        <strong>${s.message_count} messages</strong>
        ${deletedSelectedProjects.size > 1 ? `<span style="color:var(--text2);font-size:11px">${esc(s.project)}</span>` : ''}
      </div>
      <div class="ts">${formatTs(s.first_ts)} \u2192 ${formatTs(s.last_ts)}</div>
      ${s.first_message ? `<div class="first-msg">${esc(s.first_message)}</div>` : ''}
      <div class="session-actions">
        ${renderTagChips(s.tags || [], s.session_id, false)}
        <button class="btn-sm" style="border-color:var(--green);color:var(--green)" onclick="event.stopPropagation();undeleteSession('${s.session_id}')">Undelete</button>
      </div>
    </div>
  `;}).join('');
}

async function undeleteSession(sessionId) {
  await fetch(`/api/session/${sessionId}/unhide`, { method: 'PUT' });
  loadDeletedProjects();
}

async function showDeletedSession(sessionId) {
  const [msgRes, metaRes] = await Promise.all([
    fetch(`/api/session/${sessionId}`),
    fetch(`/api/session/${sessionId}/meta`),
  ]);
  const data = await msgRes.json();
  const messages = data.messages;
  const session = data.session || {};
  const meta = await metaRes.json();
  const displayName = session.name || session.slug || '';

  $('#deleted-content').innerHTML = `
    <div class="session-detail-header">
      <span class="back" onclick="loadDeletedSessions()">\u2190 Back</span>
      ${renderStars(sessionId, meta.starred, 'del-detail-stars')}
      ${displayName ? `<strong style="font-size:14px">${esc(displayName)}</strong>` : ''}
      <span style="color:var(--text2);font-size:12px">${messages.length} messages \u00b7 ${messages[0]?.project || ''}</span>
      <button class="btn-sm" style="border-color:var(--green);color:var(--green)" onclick="undeleteSession('${sessionId}')">Undelete</button>
      ${renderTagChips(meta.tags || [], sessionId, false)}
    </div>
    ${messages.map(m => `
      <div class="message-card">
        <div class="ts">${formatTs(m.timestamp)}${m.git_branch ? ` \u00b7 ${esc(m.git_branch)}` : ''}</div>
        <div class="content">${esc(m.content)}</div>
        ${m.assistant_response ? `<div class="assistant-response"><div class="assistant-label" onclick="this.parentElement.classList.toggle('collapsed')"><span class="caret">▼</span>Claude</div><div class="assistant-text">${esc(m.assistant_response)}</div></div>` : ''}
        <button class="btn-sm copy-btn" data-copy="${esc(m.content).replace(/"/g,'&quot;')}" onclick="copyText(this)">Copy</button>
      </div>
    `).join('')}
  `;
}

// --- Backup ---
async function doBackup() {
  const btn = document.querySelectorAll('nav .reindex-btn')[0];
  btn.textContent = 'Backing up...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/backup', { method: 'POST' });
    const data = await res.json();
    btn.textContent = 'Backed up!';
    setTimeout(() => { btn.textContent = 'Backup'; btn.disabled = false; }, 2000);
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Backup'; btn.disabled = false; }, 2000);
  }
}

// --- Reindex ---
async function doReindex() {
  const btn = $('nav .reindex-btn');
  btn.textContent = 'Reindexing...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/reindex', { method: 'POST' });
    const data = await res.json();
    btn.textContent = `Done! ${data.total_messages} msgs`;
    setTimeout(() => { btn.textContent = 'Reindex'; btn.disabled = false; }, 2000);
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Reindex'; btn.disabled = false; }, 2000);
  }
}

// --- Helpers ---
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatTs(ts) {
  if (!ts) return '';
  try { const d = new Date(ts); return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + ' ' + d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}); }
  catch { return ts; }
}
function copyText(btn) {
  const text = btn.dataset.copy;
  const orig = btn.textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1000);
    }).catch(() => {
      copyFallback(btn, text, orig);
    });
  } else {
    copyFallback(btn, text, orig);
  }
}
function copyFallback(btn, text, origLabel) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = origLabel, 1000);
}
